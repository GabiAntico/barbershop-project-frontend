<div class="flex justify-center mt-12">
  <form
    (ngSubmit)="saveSettings(form)"
    class="bg-slate-900/60 border border-slate-800 backdrop-blur flex flex-col w-full max-w-xl p-4 rounded-xl shadow-2xl"
    [formGroup]="form"
  >
    <h1 class="font-bold mb-4">Configuracion</h1>

    <div class="flex flex-col mb-4">
      <label class="text-slate-200 mb-1">Monto estimado por defecto</label>
      <input
        pInputText
        type="number"
        min="0"
        step="0.01"
        formControlName="defaultEstimatedAmount"
        class="w-full h-10 rounded-lg
         !bg-slate-950
         !border !border-slate-700
         focus:!border-indigo-400
         focus:!ring-0
         !text-slate-100"
      >
      @if (form.get('defaultEstimatedAmount')!.hasError('min') && form.get('defaultEstimatedAmount')!.touched) {
        <span class="mt-1 text-sm text-red-300">El monto no puede ser negativo.</span>
      }
    </div>

    <div class="flex gap-2">
      <button
        type="submit"
        [disabled]="form.invalid || !hasSettingsChanges()"
        class="h-10 px-4 rounded-lg bg-indigo-500 hover:bg-indigo-400 text-white font-medium cursor-pointer disabled:bg-slate-700 disabled:text-slate-400 disabled:cursor-not-allowed"
      >
        Guardar
      </button>
    </div>
  </form>
</div>
