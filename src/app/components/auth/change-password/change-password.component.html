<div class="flex justify-center mt-12 sm:mt-20 lg:mt-24 px-3 sm:px-4">
  <form
    [formGroup]="form"
    (ngSubmit)="save()"
    class="w-full max-w-md bg-slate-900/60 border border-slate-800 backdrop-blur flex flex-col p-5 rounded-xl shadow-2xl"
  >
    <div class="mb-5">
      <h1 class="text-xl font-bold text-slate-100">Cambiar contraseña</h1>
      <p class="text-slate-300 text-sm">Antes de continuar, reemplaza la contraseña temporal.</p>
    </div>

    <div class="flex flex-col mb-4">
      <label class="text-slate-200 mb-1">Contraseña temporal</label>
      <input
        pInputText
        type="password"
        formControlName="currentPassword"
        class="w-full h-10 rounded-lg !bg-slate-950 !border !border-slate-700 focus:!border-indigo-400 focus:!ring-0 !text-slate-100"
      />
    </div>

    <div class="flex flex-col mb-4">
      <label class="text-slate-200 mb-1">Nueva contraseña</label>
      <input
        pInputText
        type="password"
        formControlName="newPassword"
        placeholder="Minimo 6 caracteres"
        class="w-full h-10 rounded-lg !bg-slate-950 !border !border-slate-700 focus:!border-indigo-400 focus:!ring-0 !text-slate-100"
      />
    </div>

    <div class="flex flex-col mb-5">
      <label class="text-slate-200 mb-1">Confirmar contraseña</label>
      <input
        pInputText
        type="password"
        formControlName="confirmPassword"
        class="w-full h-10 rounded-lg !bg-slate-950 !border !border-slate-700 focus:!border-indigo-400 focus:!ring-0 !text-slate-100"
      />
    </div>

    <button
      type="submit"
      class="h-10 w-full sm:w-auto px-4 rounded-lg bg-indigo-500 hover:bg-indigo-400 text-white font-medium cursor-pointer disabled:opacity-60 disabled:cursor-not-allowed"
      [disabled]="isSubmitting"
    >
      Guardar contraseña
    </button>
  </form>
</div>
