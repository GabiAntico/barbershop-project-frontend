<!-- Layout -->
<div class="min-h-screen text-slate-100">

  <!-- Topbar minima -->
  <header class="app-topbar sticky top-0 z-20 flex items-center gap-3 px-3 sm:px-4 py-3 border-b border-slate-800 bg-slate-950/70 backdrop-blur">
    <!-- Boton hamburguesa -->
    <button
      type="button"
      class="h-10 w-10 grid place-items-center rounded-lg hover:bg-slate-800/50"
      (click)="sidebarOpen = true"
      aria-label="Abrir menu"
    >
      &#9776;
    </button>

    <div class="app-topbar-title font-semibold tracking-tight truncate">Turnos</div>

    @if (isLoggedIn() && context && context.branches.length > 0) {
      <p-select
        class="app-branch-select ml-auto w-44 sm:w-56 shrink-0"
        styleClass="w-full h-9 rounded-lg !bg-slate-950 !border !border-slate-700 !text-slate-100 focus:!border-indigo-400"
        [(ngModel)]="selectedBranchId"
        (ngModelChange)="onBranchSelected($event)"
        [options]="context.branches"
        optionLabel="name"
        optionValue="id"
        aria-label="Sucursal activa"
      ></p-select>
    }

    <!-- Seccion actual -->
    <div class="app-section-label text-sm text-slate-400 truncate text-right" [class.ml-auto]="!isLoggedIn() || !context || context.branches.length === 0">
      {{ getCurrentSectionLabel() }}
    </div>
  </header>

  <!-- Overlay -->
  @if(sidebarOpen){
    <div
      class="fixed inset-0 z-30 bg-black/50 backdrop-blur-sm"
      (click)="sidebarOpen = false"
    ></div>
  }

  <!-- Sidebar Drawer -->
  <aside
    class="fixed top-0 left-0 z-40 h-full w-[86vw] max-w-72 bg-slate-900 border-r border-slate-800
           transform transition-transform duration-200 ease-out flex flex-col"
    [ngClass]="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
  >
    <!-- Header sidebar -->
    <div class="flex items-center justify-between px-4 py-4 border-b border-slate-800">
      <div class="font-semibold">Menu</div>

      <button
        type="button"
        class="h-9 w-9 grid place-items-center rounded-lg hover:bg-slate-800/50"
        (click)="sidebarOpen = false"
        aria-label="Cerrar menu"
      >
        &times;
      </button>
    </div>

    <!-- Opciones -->
    <nav class="flex-1 min-h-0 p-2 space-y-4 overflow-y-auto">
      <section>
        <div class="px-3 pb-2 text-[11px] font-semibold uppercase tracking-wider text-slate-500">
          Cuenta
        </div>

        <div class="space-y-1">
          @if (isLoggedIn()) {
            <button
              type="button"
              class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left
                     text-slate-300 hover:bg-slate-800/40 cursor-pointer"
              (click)="logout()"
            >
              <span class="w-5">x</span>
              <span>Cerrar sesion</span>
            </button>
          }
        </div>
      </section>

      <section class="pt-3 border-t border-slate-800/80">
        <div class="px-3 pb-2 text-[11px] font-semibold uppercase tracking-wider text-slate-500">
          Estadisticas
        </div>

        <div class="space-y-1">
          <button
            type="button"
            class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left
                   hover:bg-slate-800/40"
            [routerLink]="['/dashboard']"
            [ngClass]="isActive('/dashboard') && !isActive('/dashboard/clients') ? 'bg-slate-800/60 text-white' : 'text-slate-300 hover:bg-slate-800/40 cursor-pointer'"
          >
            <span class="w-5">#</span>
            <span>General</span>
          </button>

          <button
            type="button"
            class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left
                   hover:bg-slate-800/40"
            [routerLink]="['/dashboard/clients']"
            [ngClass]="isActive('/dashboard/clients') ? 'bg-slate-800/60 text-white' : 'text-slate-300 hover:bg-slate-800/40 cursor-pointer'"
          >
            <span class="w-5">#</span>
            <span>Por cliente</span>
          </button>
        </div>
      </section>

      <section class="pt-3 border-t border-slate-800/80">
        <div class="px-3 pb-2 text-[11px] font-semibold uppercase tracking-wider text-slate-500">
          Agenda
        </div>

        <div class="space-y-1">
          <button
            type="button"
            class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left
                   hover:bg-slate-800/40"
            [routerLink]="['/agenda']"
            [ngClass]="isActive('/agenda') ? 'bg-slate-800/60 text-white' : 'text-slate-300 hover:bg-slate-800/40 cursor-pointer'"
          >
            <span class="w-5">#</span>
            <span>Agenda</span>
          </button>
        </div>
      </section>

      <section class="pt-3 border-t border-slate-800/80">
        <div class="px-3 pb-2 text-[11px] font-semibold uppercase tracking-wider text-slate-500">
          Clientes
        </div>

        <div class="space-y-1">
          <button
            type="button"
            class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left
                   hover:bg-slate-800/40"
            [routerLink]="['/clients-view']"
            [ngClass]="isActive('/clients-view') ? 'bg-slate-800/60 text-white' : 'text-slate-300 hover:bg-slate-800/40 cursor-pointer'"
          >
            <span class="w-5">#</span>
            <span>Ver clientes</span>
          </button>

          <button
            type="button"
            class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left
                   hover:bg-slate-800/40"
            [routerLink]="['/create-client']"
            [ngClass]="isActive('/create-client') ? 'bg-slate-800/60 text-white' : 'text-slate-300 hover:bg-slate-800/40 cursor-pointer'"
          >
            <span class="w-5">+</span>
            <span>Crear cliente</span>
          </button>
        </div>
      </section>

      <section class="pt-3 border-t border-slate-800/80">
        <div class="px-3 pb-2 text-[11px] font-semibold uppercase tracking-wider text-slate-500">
          Turnos
        </div>

        <div class="space-y-1">
          <button
            type="button"
            class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left
                   hover:bg-slate-800/40"
            [routerLink]="['/shifts-view']"
            [ngClass]="isActive('/shifts-view') ? 'bg-slate-800/60 text-white' : 'text-slate-300 hover:bg-slate-800/40 cursor-pointer'"
          >
            <span class="w-5">#</span>
            <span>Ver turnos</span>
          </button>

          <button
            type="button"
            class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left
                   hover:bg-slate-800/40"
            [routerLink]="['/create-shift']"
            [ngClass]="isActive('/create-shift') ? 'bg-slate-800/60 text-white' : 'text-slate-300 hover:bg-slate-800/40 cursor-pointer'"
          >
            <span class="w-5">+</span>
            <span>Crear turno</span>
          </button>
        </div>
      </section>

      <section class="pt-3 border-t border-slate-800/80">
        <div class="px-3 pb-2 text-[11px] font-semibold uppercase tracking-wider text-slate-500">
          Visitas
        </div>

        <div class="space-y-1">
          <button
            type="button"
            class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left
                   hover:bg-slate-800/40"
            [routerLink]="['/visits-view']"
            [ngClass]="isActive('/visits-view') ? 'bg-slate-800/60 text-white' : 'text-slate-300 hover:bg-slate-800/40 cursor-pointer'"
          >
            <span class="w-5">#</span>
            <span>Ver visitas</span>
          </button>
        </div>
      </section>

      <section class="pt-3 border-t border-slate-800/80">
        <div class="px-3 pb-2 text-[11px] font-semibold uppercase tracking-wider text-slate-500">
          Configuracion
        </div>

        <div class="space-y-1">
          <button
            type="button"
            class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left
                   hover:bg-slate-800/40"
            [routerLink]="['/settings']"
            [ngClass]="isActive('/settings') ? 'bg-slate-800/60 text-white' : 'text-slate-300 hover:bg-slate-800/40 cursor-pointer'"
          >
            <span class="w-5">#</span>
            <span>Configuracion</span>
          </button>
        </div>
      </section>
    </nav>

    <!-- Footer sidebar -->
    <div class="shrink-0 p-4 border-t border-slate-800 text-xs text-slate-400">
      Shifts Frontend
    </div>
  </aside>

  <!-- Contenido principal -->
  <main class="px-3 sm:px-4 py-4 sm:py-6">
    <p-toast></p-toast>
    <router-outlet></router-outlet>
  </main>
</div>
